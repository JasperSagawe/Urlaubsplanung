<!DOCTYPE html>
<html xmlns:th="https://www.thymleaf.org">
  <body>
    <div th:fragment="mitarbeiterTabelle">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Vorname</th>
            <th>Nachname</th>
            <th>Email</th>
            <th>Team</th>
            <th>Aktiv</th>
            <th>Passwort zurücksetzen</th>
            <th>Urlaubstage aus dem Vorjahr</th>
            <th>Freie Urlaubstage</th>
            <th>Beantragte Urlaubstage</th>
            <th>Genommene Urlaubstage</th>
            <th>Löschen</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="m : ${mitarbeiter}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.vorname}"></td>
            <td th:text="${m.nachname}"></td>
            <td th:text="${m.email}"></td>
            <td th:text="${m.team}"></td>
            <td th:text="${m.aktiv}"></td>
            <td th:text="${m.passwortZuruecksetzen}"></td>
            <td th:text="${m.urlaubsdaten.urlaubVorjahr}"></td>
            <td th:text="${m.urlaubsdaten.offeneUrlaubstage}"></td>
            <td th:text="${m.urlaubsdaten.beantragteUrlaubstage}"></td>
            <td th:text="${m.urlaubsdaten.genommeneUrlaubstage}"></td>
            <td>
              <button
                class="btn btn-danger delete-mitarbeiter-btn"
                th:data-id="${m.id}"
              >
                Löschen
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
