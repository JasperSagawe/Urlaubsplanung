<!DOCTYPE html>
<html xmlns:th="https://www.thymleaf.org">
  <head>
    <meta charset="ISO-8859-1" />
    <title>Urlaubsplanung</title>
    <link rel="stylesheet" type="text/css" href="/styles.css" />
  </head>
  <form action="/logout" method="post">
    <input
      type="hidden"
      th:name="${_csrf.parameterName}"
      th:value="${_csrf.token}"
    />
    <button type="submit">Logout</button>
  </form>
  <div sec:authorize="hasRole('ADMIN')">
    Dies ist nur für Admins Sichtbar: <a th:href="@{/admin}">Admin</a>
  </div>

  Das ist einfach die Startseite.

  <p>Willkommen, <span th:text="${#authentication.name}">User</span>!</p>

  <div>
    Weiterleitung zum Kalender zum testen.
    <a th:href="@{/kalender}">Kalender</a>
  </div>
</html>
